steps:
# Step 1: Zip the app folder
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      zip -r code.zip app/

# Step 2: Upload to GCS
- name: 'gcr.io/cloud-builders/gsutil'
  args:
    - cp
    - code.zip
    - gs://etl-pyspark-bucket/code.zip

options:
  logging: CLOUD_LOGGING_ONLY